<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>営業カレンダー</title>
  <style>
    :root {
      --holiday-bg: #ffefbf;
      --holiday-color: #dd0000;
      --today-bg: #d4edff;
      --today-outline: #3399ff;
      --header-bg: #f5f5f5;
      --border: 1px solid #e0dfe3;
      --sat-color: #2255bb;
      --sun-color: #cc2200;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      color: #333;
      padding: 6px;
    }

    .cal-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cal-block {
      width: 100%;
    }

    .cal-title {
      text-align: center;
      font-size: 0.95em;
      font-weight: bold;
      padding: 6px 0;
      background: var(--header-bg);
      border: var(--border);
      border-bottom: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      background: var(--header-bg);
      font-weight: bold;
      text-align: center;
      font-size: 10px;
      padding: 3px 1px;
      border: var(--border);
      color: #333;
    }
    th.sun { color: var(--sun-color); }
    th.sat { color: var(--sat-color); }

    td {
      padding: 2px 1px;
      border: var(--border);
      font-size: 12px;
      height: 50px;
      vertical-align: top;
      text-align: center;
      background: #fff;
      color: #333;
    }
    td.empty { background: #fafafa; }
    td.holiday { background: var(--holiday-bg); }
    td.holiday .dnum { color: var(--holiday-color); }
    td.today {
      outline: 2px solid var(--today-outline);
      outline-offset: -2px;
    }
    td.today:not(.holiday) { background: var(--today-bg); }
    td.today .dnum { font-weight: bold; }
    td.sat:not(.holiday) .dnum { color: var(--sat-color); }
    td.sun:not(.holiday) .dnum { color: var(--sun-color); }

    /* 日付セル内のレイアウト */
    .dnum { display: block; font-size: 13px; line-height: 1.1; }
    .rk { display: block; font-size: 9px; line-height: 1.3; color: #666; }
    .rk-taian   { color: #1a7f37; font-weight: bold; }  /* 大安=吉 */
    .rk-butsu   { color: #aaa; }                         /* 仏滅 */
    .rk-tomo    { color: #1a7f37; }                      /* 友引=吉 */
    .koyomi { display: flex; flex-wrap: wrap; justify-content: center; gap: 1px; margin-top: 1px; }
    .kbadge {
      display: inline-block; font-size: 8px; line-height: 1.25;
      padding: 0 2px; border-radius: 3px; white-space: nowrap;
      letter-spacing: -0.5px; font-weight: bold;
    }
    .k-tensha  { background: #d4af37; color: #4a3500; }  /* 天赦日 */
    .k-ichiryu { background: #fff2cc; color: #b8860b; border: 1px solid #e8cf86; }  /* 一粒万倍日 */
    .k-tora    { background: #eef4ff; color: #2255bb; }  /* 寅の日 */
    .k-mi      { background: #eafaef; color: #2e8b57; }  /* 巳の日 */

    .legend {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 11px;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-box {
      width: 13px;
      height: 13px;
      border: var(--border);
      display: inline-block;
      flex-shrink: 0;
    }
    .legend-box.h { background: var(--holiday-bg); }
    .legend-box.t { background: var(--today-bg); outline: 2px solid var(--today-outline); outline-offset: -2px; }
  </style>
</head>
<body>

<div class="cal-wrapper" id="calendars"></div>
<div class="legend">
  <span class="legend-item"><span class="legend-box h"></span>定休日</span>
  <span class="legend-item"><span class="legend-box t"></span>本日</span>
  <span class="legend-item"><span class="kbadge k-tensha">天赦</span>天赦日</span>
  <span class="legend-item"><span class="kbadge k-ichiryu">一粒万倍</span>一粒万倍日</span>
  <span class="legend-item"><span class="kbadge k-tora">寅</span>寅の日</span>
  <span class="legend-item"><span class="kbadge k-mi">巳</span>巳の日</span>
  <span class="legend-item"><span class="rk rk-taian" style="display:inline">大安</span>＝吉日</span>
</div>

<script>
  // ===== 国民の祝日（振替休日含む） =====
  // mentwo.com/calendar のデータに準拠。毎年末に翌年分を追記してください。
  const NATIONAL_HOLIDAYS = {
    // 2025
    '2025-07-21': '海の日',
    '2025-08-11': '山の日',
    '2025-09-15': '敬老の日',
    '2025-09-23': '秋分の日',
    '2025-10-13': 'スポーツの日',
    '2025-11-03': '文化の日',
    '2025-11-23': '勤労感謝の日',
    '2025-11-24': '振替休日',
    // 2026
    '2026-01-01': '元日',
    '2026-01-12': '成人の日',
    '2026-02-11': '建国記念の日',
    '2026-02-23': '天皇誕生日',
    '2026-03-20': '春分の日',
    '2026-04-29': '昭和の日',
    '2026-05-03': '憲法記念日',
    '2026-05-04': 'みどりの日',
    '2026-05-05': 'こどもの日',
    '2026-05-06': '振替休日',
    '2026-07-20': '海の日',
    '2026-08-11': '山の日',
    '2026-09-21': '敬老の日',
    '2026-09-22': '国民の休日',
    '2026-09-23': '秋分の日',
    '2026-10-12': 'スポーツの日',
    '2026-11-03': '文化の日',
    '2026-11-23': '勤労感謝の日',
    // 2027
    '2027-01-01': '元日',
    '2027-01-11': '成人の日',
    '2027-02-11': '建国記念の日',
    '2027-02-23': '天皇誕生日',
    '2027-03-21': '春分の日',
    '2027-04-29': '昭和の日',
    '2027-05-03': '憲法記念日',
    '2027-05-04': 'みどりの日',
    '2027-05-05': 'こどもの日',
    '2027-07-19': '海の日',
    '2027-08-11': '山の日',
    '2027-09-20': '敬老の日',
    '2027-09-23': '秋分の日',
    '2027-10-11': 'スポーツの日',
    '2027-11-03': '文化の日',
    '2027-11-23': '勤労感謝の日',
  };

  // ===== 店舗独自の休業日（お盆・年末年始・臨時休業など） =====
  // おちゃのこネット管理画面「デザイン管理 > カレンダー設定 > イベント設定」の
  // 休業日（黄色セル）のうち、土日・国民の祝日を除いた店舗固有の休みだけをここに列挙する。
  // admin39.ocnk.net の設定を変更したら、ここも合わせて更新すること。
  const SHOP_CLOSED_DAYS = {
    '2026-08-12': 'お盆休み',
    '2026-08-13': 'お盆休み',
    '2026-08-14': 'お盆休み',
    '2026-12-29': '年末休み',
    '2026-12-30': '年末休み',
    '2026-12-31': '年末休み',
  };

  function pad2(n) { return String(n).padStart(2, '0'); }

  function isHoliday(y, m, d) {
    const key = `${y}-${pad2(m)}-${pad2(d)}`;
    const dow = new Date(y, m - 1, d).getDay(); // 0=日, 6=土
    if (dow === 0 || dow === 6) return true;
    if (SHOP_CLOSED_DAYS[key]) return true;
    return !!NATIONAL_HOLIDAYS[key];
  }

  // ===== 六曜・暦注データ =====
  // .seminar_analysis/gen_koyomi.py で ephem を用いて算出（六曜=旧暦, 一粒万倍日/天赦日=節気+干支）。
  // 範囲は 2025-06〜2027-12。年末に gen_koyomi.py を再実行して更新すること。
  // roku: "YYYY-MM" -> 各日の六曜index文字列(0=大安,1=赤口,2=先勝,3=友引,4=先負,5=仏滅)。
  const KOYOMI = {"roku":{"2025-06":"501234501234501234501234123450?","2025-07":"1234501234501234501234501234501","2025-08":"2345012345012345012345234501234","2025-09":"501234501234501234501345012345?","2025-10":"0123450123450123450145012345012","2025-11":"345012345012345012350123450123?","2025-12":"4501234501234501234012345012345","2026-01":"0123450123450123451234501234501","2026-02":"2345012345012345234501234501???","2026-03":"2345012345012345013450123450123","2026-04":"450123450123450145012345012345?","2026-05":"0123450123450123501234501234501","2026-06":"234501234501230123450123450123?","2026-07":"4501234501234123450123450123450","2026-08":"1234501234502345012345012345012","2026-09":"345012345034501234501234501234?","2026-10":"5012345012450123450123450123450","2026-11":"123450125012345012345012345012?","2026-12":"3450123401234501234501234501234","2027-01":"5012345123450123450123450123450","2027-02":"1234502345012345012345012345???","2027-03":"0123450345012345012345012345012","2027-04":"345012450123450123450123450123?","2027-05":"4501250123450123450123450123450","2027-06":"123401234501234501234501234501?","2027-07":"2341234501234501234501234501234","2027-08":"5234501234501234501234501234501","2027-09":"345012345012345012345012345014?","2027-10":"5012345012345012345012345012501","2027-11":"234501234501234501234501234012?","2027-12":"3450123450123450123450123451234"},"tags":{"一粒万倍日":["2025-06-03","2025-06-04","2025-06-05","2025-06-06","2025-06-17","2025-06-18","2025-06-29","2025-06-30","2025-07-12","2025-07-15","2025-07-24","2025-07-27","2025-08-05","2025-08-11","2025-08-18","2025-08-23","2025-08-30","2025-09-04","2025-09-07","2025-09-12","2025-09-19","2025-09-24","2025-10-01","2025-10-06","2025-10-16","2025-10-19","2025-10-28","2025-10-31","2025-11-12","2025-11-13","2025-11-24","2025-11-25","2025-12-06","2025-12-08","2025-12-09","2025-12-20","2025-12-21","2026-01-01","2026-01-02","2026-01-05","2026-01-14","2026-01-17","2026-01-26","2026-01-29","2026-02-08","2026-02-13","2026-02-20","2026-02-25","2026-03-04","2026-03-05","2026-03-12","2026-03-17","2026-03-24","2026-03-29","2026-04-08","2026-04-11","2026-04-20","2026-04-23","2026-05-02","2026-05-05","2026-05-06","2026-05-17","2026-05-18","2026-05-29","2026-05-30","2026-06-12","2026-06-13","2026-06-24","2026-06-25","2026-07-06","2026-07-07","2026-07-10","2026-07-19","2026-07-22","2026-07-31","2026-08-03","2026-08-13","2026-08-18","2026-08-25","2026-08-30","2026-09-06","2026-09-07","2026-09-14","2026-09-19","2026-09-26","2026-10-01","2026-10-11","2026-10-14","2026-10-23","2026-10-26","2026-11-04","2026-11-07","2026-11-08","2026-11-19","2026-11-20","2026-12-01","2026-12-02","2026-12-15","2026-12-16","2026-12-27","2026-12-28","2027-01-09","2027-01-12","2027-01-21","2027-01-24","2027-02-02","2027-02-08","2027-02-15","2027-02-20","2027-02-27","2027-03-04","2027-03-07","2027-03-12","2027-03-19","2027-03-24","2027-03-31","2027-04-06","2027-04-15","2027-04-18","2027-04-27","2027-04-30","2027-05-12","2027-05-13","2027-05-24","2027-05-25","2027-06-05","2027-06-07","2027-06-08","2027-06-19","2027-06-20","2027-07-01","2027-07-02","2027-07-14","2027-07-17","2027-07-26","2027-07-29","2027-08-07","2027-08-08","2027-08-13","2027-08-20","2027-08-25","2027-09-01","2027-09-06","2027-09-09","2027-09-14","2027-09-21","2027-09-26","2027-10-03","2027-10-09","2027-10-18","2027-10-21","2027-10-30","2027-11-02","2027-11-14","2027-11-15","2027-11-26","2027-11-27","2027-12-10","2027-12-11","2027-12-22","2027-12-23"],"天赦日":["2025-07-24","2025-08-07","2025-10-06","2025-12-21","2026-03-05","2026-05-04","2026-05-20","2026-07-19","2026-10-01","2026-12-16","2027-02-28","2027-04-29","2027-05-15","2027-07-14","2027-09-26","2027-12-11"],"寅の日":["2025-06-02","2025-06-14","2025-06-26","2025-07-08","2025-07-20","2025-08-01","2025-08-13","2025-08-25","2025-09-06","2025-09-18","2025-09-30","2025-10-12","2025-10-24","2025-11-05","2025-11-17","2025-11-29","2025-12-11","2025-12-23","2026-01-04","2026-01-16","2026-01-28","2026-02-09","2026-02-21","2026-03-05","2026-03-17","2026-03-29","2026-04-10","2026-04-22","2026-05-04","2026-05-16","2026-05-28","2026-06-09","2026-06-21","2026-07-03","2026-07-15","2026-07-27","2026-08-08","2026-08-20","2026-09-01","2026-09-13","2026-09-25","2026-10-07","2026-10-19","2026-10-31","2026-11-12","2026-11-24","2026-12-06","2026-12-18","2026-12-30","2027-01-11","2027-01-23","2027-02-04","2027-02-16","2027-02-28","2027-03-12","2027-03-24","2027-04-05","2027-04-17","2027-04-29","2027-05-11","2027-05-23","2027-06-04","2027-06-16","2027-06-28","2027-07-10","2027-07-22","2027-08-03","2027-08-15","2027-08-27","2027-09-08","2027-09-20","2027-10-02","2027-10-14","2027-10-26","2027-11-07","2027-11-19","2027-12-01","2027-12-13","2027-12-25"],"巳の日":["2025-06-05","2025-06-17","2025-06-29","2025-07-11","2025-07-23","2025-08-04","2025-08-16","2025-08-28","2025-09-09","2025-09-21","2025-10-03","2025-10-15","2025-10-27","2025-11-08","2025-11-20","2025-12-02","2025-12-14","2025-12-26","2026-01-07","2026-01-19","2026-01-31","2026-02-12","2026-02-24","2026-03-08","2026-03-20","2026-04-01","2026-04-13","2026-04-25","2026-05-07","2026-05-19","2026-05-31","2026-06-12","2026-06-24","2026-07-06","2026-07-18","2026-07-30","2026-08-11","2026-08-23","2026-09-04","2026-09-16","2026-09-28","2026-10-10","2026-10-22","2026-11-03","2026-11-15","2026-11-27","2026-12-09","2026-12-21","2027-01-02","2027-01-14","2027-01-26","2027-02-07","2027-02-19","2027-03-03","2027-03-15","2027-03-27","2027-04-08","2027-04-20","2027-05-02","2027-05-14","2027-05-26","2027-06-07","2027-06-19","2027-07-01","2027-07-13","2027-07-25","2027-08-06","2027-08-18","2027-08-30","2027-09-11","2027-09-23","2027-10-05","2027-10-17","2027-10-29","2027-11-10","2027-11-22","2027-12-04","2027-12-16","2027-12-28"]}};
  const ROKUYO = ['大安', '赤口', '先勝', '友引', '先負', '仏滅'];

  // 暦注: 日付 -> ラベル配列 の逆引きマップを構築
  const KOYOMI_TAGS = {};
  for (const [name, dates] of Object.entries(KOYOMI.tags || {})) {
    for (const dt of dates) (KOYOMI_TAGS[dt] || (KOYOMI_TAGS[dt] = [])).push(name);
  }
  const TAG_META = {
    '天赦日':    { cls: 'k-tensha',  label: '天赦' },
    '一粒万倍日': { cls: 'k-ichiryu', label: '一粒万倍' },
    '寅の日':    { cls: 'k-tora',    label: '寅' },
    '巳の日':    { cls: 'k-mi',      label: '巳' },
  };

  function rokuyoOf(y, m, d) {
    const s = (KOYOMI.roku || {})[`${y}-${pad2(m)}`];
    if (!s) return null;
    const c = s[d - 1];
    return (c && c !== '?') ? ROKUYO[+c] : null;
  }
  function rokuyoClass(r) {
    if (r === '大安') return 'rk-taian';
    if (r === '仏滅') return 'rk-butsu';
    if (r === '友引') return 'rk-tomo';
    return '';
  }
  function koyomiBadges(y, m, d) {
    const tags = KOYOMI_TAGS[`${y}-${pad2(m)}-${pad2(d)}`] || [];
    if (!tags.length) return '';
    const html = tags
      .filter(t => TAG_META[t])
      .map(t => `<span class="kbadge ${TAG_META[t].cls}">${TAG_META[t].label}</span>`)
      .join('');
    return `<span class="koyomi">${html}</span>`;
  }

  function buildCalendar(year, month) {
    const today  = new Date();
    const todayY = today.getFullYear();
    const todayM = today.getMonth() + 1;
    const todayD = today.getDate();

    const MONTH_JP = ['1月','2月','3月','4月','5月','6月',
                      '7月','8月','9月','10月','11月','12月'];
    const DOW_JP   = ['日','月','火','水','木','金','土'];

    const firstDow    = new Date(year, month - 1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();

    // セル配列を構築（空セル含む）
    const cells = [];
    for (let i = 0; i < firstDow; i++)        cells.push(null);
    for (let d = 1; d <= daysInMonth; d++)     cells.push(d);
    while (cells.length % 7 !== 0)             cells.push(null);

    let html = `<div class="cal-block">`;
    html += `<div class="cal-title">${year}年${MONTH_JP[month - 1]}</div>`;
    html += `<table><thead><tr>`;
    for (let i = 0; i < 7; i++) {
      const cls = i === 0 ? ' sun' : i === 6 ? ' sat' : '';
      html += `<th class="${cls.trim()}">${DOW_JP[i]}</th>`;
    }
    html += `</tr></thead><tbody>`;

    for (let i = 0; i < cells.length; i += 7) {
      html += '<tr>';
      for (let j = 0; j < 7; j++) {
        const d = cells[i + j];
        if (d === null) {
          html += '<td class="empty"></td>';
        } else {
          const holiday = isHoliday(year, month, d);
          const isToday = (year === todayY && month === todayM && d === todayD);
          const dow = (firstDow + d - 1) % 7; // 0=日, 6=土

          const cls = [
            holiday              ? 'holiday' : '',
            isToday              ? 'today'   : '',
            !holiday && dow === 0 ? 'sun'    : '',
            !holiday && dow === 6 ? 'sat'    : '',
          ].filter(Boolean).join(' ');

          const rk = rokuyoOf(year, month, d);
          const rkHtml = rk ? `<span class="rk ${rokuyoClass(rk)}">${rk}</span>` : '';
          const badges = koyomiBadges(year, month, d);

          html += `<td${cls ? ` class="${cls}"` : ''}>` +
                  `<span class="dnum">${d}</span>${rkHtml}${badges}</td>`;
        }
      }
      html += '</tr>';
    }

    html += `</tbody></table></div>`;
    return html;
  }

  // 当月・翌月を表示
  const now = new Date();
  let y = now.getFullYear();
  let m = now.getMonth() + 1;
  let y2 = m === 12 ? y + 1 : y;
  let m2 = m === 12 ? 1 : m + 1;

  document.getElementById('calendars').innerHTML =
    buildCalendar(y, m) + buildCalendar(y2, m2);

  // iframe内で使用される場合、親ページに実際の高さを通知する
  function notifyHeight() {
    const h = document.documentElement.scrollHeight;
    if (window.parent !== window) {
      window.parent.postMessage({ calendarHeight: h }, '*');
    }
  }
  window.addEventListener('load', notifyHeight);
  window.addEventListener('resize', notifyHeight);
</script>

</body>
</html>
